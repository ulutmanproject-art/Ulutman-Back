name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build jar
        run: ./mvnw clean package -DskipTests

      - name: Copy jar to root for Dockerfile
        run: cp target/ulutman-0.0.1-SNAPSHOT.jar ulutman-0.0.1-SNAPSHOT.jar

      - name: Prepare target directory on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.HOST }}
          username: ${{ vars.USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            mkdir -p /home/ubuntu/ulutman-main
            chmod 755 /home/ubuntu
            chmod -R u+rwX /home/ubuntu/ulutman-main
            ls -ld /home/ubuntu /home/ubuntu/ulutman-main

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.HOST }}
          username: ${{ vars.USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "Dockerfile,docker-compose.yml,nginx.conf,ulutman-0.0.1-SNAPSHOT.jar"
          target: "/home/ubuntu/ulutman-main"
          overwrite: true

      - name: Restart app on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.HOST }}
          username: ${{ vars.USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 15m
          script: |
            cd /home/ubuntu/ulutman-main
            sudo docker compose down
            sudo docker compose up -d --build
            sudo docker ps